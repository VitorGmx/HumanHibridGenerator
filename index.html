<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Criaturas</title>

<style>
body{
  margin:0;
  font-family: Arial;
  background:#111;
  color:#fff;
}

h1{
  text-align:center;
  margin:20px 0;
}

.container{
  max-width:900px;
  margin:auto;
  padding:10px;
}

.row{
  display:flex;
  align-items:center;
  justify-content:space-between;
  background:#1c1c1c;
  margin:8px 0;
  padding:10px;
  border-radius:10px;
}

button{
  background:#ff7aa8;
  border:none;
  padding:10px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  width:140px;
}

button:disabled{
  background:#444;
  color:#aaa;
  cursor:not-allowed;
}

.value{
  flex:1;
  margin-left:10px;
}

.box{
  background:#000;
  padding:6px;
  margin:4px 0;
  border-radius:6px;
}

footer{
  text-align:center;
  margin:20px;
  opacity:0.7;
}
</style>
</head>

<body>

<h1>Gerador de Criaturas</h1>

<div class="container">

  <div class="row"><button id="baseBtn">Base</button><div id="base" class="value"></div></div>
  <div class="row"><button id="generoBtn">Gênero</button><div id="genero" class="value"></div></div>
  <div class="row"><button id="rostoBtn">Rosto</button><div id="rosto" class="value"></div></div>
  <div class="row"><button id="olhosBtn">Olhos</button><div id="olhos" class="value"></div></div>
  <div class="row"><button id="narizBtn">Nariz</button><div id="nariz" class="value"></div></div>
  <div class="row"><button id="cabeloBtn">Cabelo</button><div id="cabelo" class="value"></div></div>
  <div class="row"><button id="vestimentaBtn">Vestimenta</button><div id="vestimenta" class="value"></div></div>
  <div class="row"><button id="poseBtn">Pose</button><div id="pose" class="value"></div></div>

  <div class="row">
    <button id="extrasBtn">Extras</button>
    <div id="extras" class="value"></div>
  </div>

</div>

<footer>feito por: Vitor</footer>

<script>
"use strict";

/* =========================
   DADOS
========================= */
const data = {
  base:["Humano","Elfo","Goblin","Orc","Vampiro","Anjo","Demônio","Gigante","Sereia","Lobisomem"],
  genero:["masculino","feminino"],
  rosto:["fino","quadrado","marcado","animal"],
  olhos:["negros","dourados","heterocromia","normais"],
  nariz:["reto","quebrado","fino","achatado"],
  cabelo:["curto","longo","crespo","liso","ondulado","loiro curto","moreno liso"],
  vestimenta:["leve","pesada","tribal","arcaica","capa","mago simples","caçador","ritual simples"],
  pose:["em pé","agachado","correndo","flutuando","em combate"],
  extras:["chifres","asas","fumaça","ossos","cristais","musgo","espinhos","energia instável"]
};

let locked = {};

/* =========================
   FUNÇÕES SEGURAS
========================= */

function rand(arr){
  return arr[Math.floor(Math.random() * arr.length)];
}

function animate(el, arr, cb){
  let i = 0;
  const t = setInterval(() => {
    el.textContent = rand(arr);
    i++;
    if(i > 6) clearInterval(t);
  }, 60);
}

function setTrait(key){
  if(locked[key]) return;

  const el = document.getElementById(key);
  const btn = document.getElementById(key + "Btn");

  animate(el, data[key]);

  setTimeout(() => {
    const final = rand(data[key]);
    el.innerHTML = `<div class="box">- ${final}</div>`;
    locked[key] = true;
    btn.disabled = true;
  }, 450);
}

/* =========================
   EXTRAS (4 slots seguros)
========================= */

function setExtras(){
  if(locked.extras) return;

  const el = document.getElementById("extras");
  const used = [];

  let i = 0;
  const anim = setInterval(() => {
    el.textContent = rand(data.extras);
    i++;
    if(i > 6) clearInterval(anim);
  }, 60);

  setTimeout(() => {
    el.innerHTML = "";

    for(let i = 0; i < 4; i++){
      let v;
      do {
        v = rand(data.extras);
      } while(used.includes(v));

      used.push(v);

      const div = document.createElement("div");
      div.className = "box";
      div.textContent = "- " + v;
      el.appendChild(div);
    }

    locked.extras = true;
    document.getElementById("extrasBtn").disabled = true;
  }, 450);
}

/* =========================
   EVENTOS (seguro pro GitHub)
========================= */

window.addEventListener("DOMContentLoaded", () => {

  const keys = ["base","genero","rosto","olhos","nariz","cabelo","vestimenta","pose"];

  keys.forEach(k => {
    const btn = document.getElementById(k + "Btn");
    btn.addEventListener("click", () => setTrait(k));
  });

  document.getElementById("extrasBtn")
    .addEventListener("click", setExtras);

});
</script>

</body>
</html>
