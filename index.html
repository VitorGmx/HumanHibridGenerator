<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Híbridos</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#121212;
  color:#fff;
  margin:0;
  padding:20px;
}

h1{
  text-align:center;
}

.container{
  max-width:900px;
  margin:auto;
}

.row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  background:#1c1c1c;
  padding:10px;
  margin:8px 0;
  border-radius:10px;
}

button{
  background:#ff7aa8;
  border:none;
  padding:8px 12px;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

button:disabled{
  background:#444;
  color:#aaa;
  cursor:not-allowed;
}

.value{
  flex:1;
  margin-left:10px;
}

.box{
  background:#000;
  padding:6px;
  margin:4px 0;
  border-radius:6px;
}

</style>
</head>

<body>

<h1>Gerador de Híbridos Coerentes</h1>

<div class="container">

  <div class="row"><button id="baseBtn">Base</button><div id="base" class="value"></div></div>
  <div class="row"><button id="generoBtn">Gênero</button><div id="genero" class="value"></div></div>
  <div class="row"><button id="rostoBtn">Rosto</button><div id="rosto" class="value"></div></div>
  <div class="row"><button id="olhosBtn">Olhos</button><div id="olhos" class="value"></div></div>
  <div class="row"><button id="narizBtn">Nariz</button><div id="nariz" class="value"></div></div>
  <div class="row"><button id="cabeloBtn">Cabelo</button><div id="cabelo" class="value"></div></div>
  <div class="row"><button id="vestimentaBtn">Vestimenta</button><div id="vestimenta" class="value"></div></div>
  <div class="row"><button id="poseBtn">Pose</button><div id="pose" class="value"></div></div>

  <div class="row">
    <button id="extrasBtn">Extras</button>
    <div id="extras" class="value"></div>
  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

const traits = {
  base:["Humano","Elfo","Goblin","Orc","Vampiro","Anjo","Demônio","Gigante"],
  genero:["masculino","feminino"],
  rosto:["fino","quadrado","marcado","animal"],
  olhos:["negros","dourados","heterocromia","normais"],
  nariz:["reto","quebrado","fino","achatado"],
  cabelo:["curto","longo","crespo","liso","loiro","moreno","ondulado"],
  vestimenta:["leve","pesada","tribal","arcaica","capa","mago","caçador","ritual"],
  pose:["em pé","agachado","correndo","flutuando","combate"],
  extras:["chifres","asas","fumaça","ossos","cristais","musgo","espinhos"]
};

let locked = {};

function pick(arr){
  return arr[Math.floor(Math.random()*arr.length)];
}

function setTrait(key){
  if(locked[key]) return;

  const el = document.getElementById(key);
  const btn = document.getElementById(key+"Btn");

  let i = 0;
  const anim = setInterval(() => {
    el.innerText = pick(traits[key]);
    i++;
    if(i > 6) clearInterval(anim);
  }, 60);

  setTimeout(() => {
    const final = pick(traits[key]);
    el.innerHTML = "<div class='box'>- " + final + "</div>";
    locked[key] = true;
    btn.disabled = true;
  }, 500);
}

function setExtras(){
  if(locked.extras) return;

  const el = document.getElementById("extras");
  let used = [];

  let i = 0;
  const anim = setInterval(() => {
    el.innerText = pick(traits.extras);
    i++;
    if(i > 6) clearInterval(anim);
  }, 60);

  setTimeout(() => {
    el.innerHTML = "";

    for(let j=0;j<4;j++){
      let v;
      do{
        v = pick(traits.extras);
      }while(used.includes(v));

      used.push(v);

      const div = document.createElement("div");
      div.className = "box";
      div.innerText = "- " + v;
      el.appendChild(div);
    }

    locked.extras = true;
    document.getElementById("extrasBtn").disabled = true;
  }, 500);
}

["base","genero","rosto","olhos","nariz","cabelo","vestimenta","pose"].forEach(k=>{
  document.getElementById(k+"Btn").onclick = () => setTrait(k);
});

document.getElementById("extrasBtn").onclick = setExtras;

});
</script>

</body>
</html>
